version: '3.8'

networks:
  suraksha-net:
    driver: bridge
    name: suraksha-net

volumes:
  postgres_data:
    name: suraksha_postgres_data
  redis_data:
    name: suraksha_redis_data
  rabbitmq_data:
    name: suraksha_rabbitmq_data

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Infrastructure Services
  # ────────────────────────────────────────────────────────────────────────────
  
  postgres:
    image: postgres:15-alpine
    container_name: suraksha-postgres
    networks:
      - suraksha-net
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-suraksha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suraksha_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-suraksha_db}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-suraksha} -d ${POSTGRES_DB:-suraksha_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: suraksha-redis
    networks:
      - suraksha-net
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: suraksha-rabbitmq
    networks:
      - suraksha-net
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-suraksha}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-suraksha_dev_pass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Backend Services (FastAPI with hot-reload)
  # ────────────────────────────────────────────────────────────────────────────
  
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: development
    container_name: suraksha-api
    networks:
      - suraksha-net
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-suraksha}:${POSTGRES_PASSWORD:-suraksha_dev_pass}@postgres:5432/${POSTGRES_DB:-suraksha_db}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # RabbitMQ
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-suraksha}:${RABBITMQ_PASSWORD:-suraksha_dev_pass}@rabbitmq:5672/
      # App Config
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-jwt-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      # External APIs
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_API_URL: https://api.openweathermap.org/data/2.5
      # Feature Flags
      MOCK_MODE: ${MOCK_MODE:-true}
      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    volumes:
      - ./services/api:/app:cached
      - ./shared:/app/shared:cached
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  fraud:
    build:
      context: .
      dockerfile: services/fraud/Dockerfile
      target: development
    container_name: suraksha-fraud
    networks:
      - suraksha-net
    ports:
      - "${FRAUD_PORT:-8001}:8001"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-suraksha}:${POSTGRES_PASSWORD:-suraksha_dev_pass}@postgres:5432/${POSTGRES_DB:-suraksha_db}
      # Service Config
      SERVICE_PORT: "8001"
      LOG_LEVEL: INFO
      # Fraud Detection
      FRAUD_MODEL_PATH: /app/ml/models/fraud_model.joblib
      FRAUD_THRESHOLD_HIGH: "0.6"
      FRAUD_THRESHOLD_CRITICAL: "0.85"
      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:8000
    volumes:
      - ./services/fraud:/app:cached
      - ./shared:/app/shared:cached
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload --log-level info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  trigger:
    build:
      context: .
      dockerfile: services/trigger/Dockerfile
      target: development
    container_name: suraksha-trigger
    networks:
      - suraksha-net
    ports:
      - "${TRIGGER_PORT:-8002}:8002"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-suraksha}:${POSTGRES_PASSWORD:-suraksha_dev_pass}@postgres:5432/${POSTGRES_DB:-suraksha_db}
      # Service Config
      SERVICE_PORT: "8002"
      LOG_LEVEL: INFO
      # External APIs
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_API_URL: https://api.openweathermap.org/data/2.5
      OPENAQ_API_URL: https://api.openaq.org/v2
      # Trigger Thresholds
      TRIGGER_HEAVY_RAIN_MM: "5.0"
      TRIGGER_EXTREME_HEAT_C: "42.0"
      TRIGGER_POLLUTION_AQI: "300"
      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:8000
    volumes:
      - ./services/trigger:/app:cached
      - ./shared:/app/shared:cached
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload --log-level info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend Services (Next.js with hot-reload)
  # ────────────────────────────────────────────────────────────────────────────
  
  worker-web:
    build:
      context: .
      dockerfile: apps/worker-web/Dockerfile
      target: development
    container_name: suraksha-worker-web
    networks:
      - suraksha-net
    ports:
      - "${WORKER_WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/worker-web:/app:cached
      - ./packages/shared-types:/packages/shared-types:cached
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      target: development
    container_name: suraksha-admin-web
    networks:
      - suraksha-net
    ports:
      - "${ADMIN_WEB_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/admin-web:/app:cached
      - ./packages/shared-types:/packages/shared-types:cached
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
