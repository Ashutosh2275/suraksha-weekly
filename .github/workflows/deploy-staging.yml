name: deploy-staging

on:
  workflow_run:
    workflows: ["suraksha-ci-cd"]
    types: [completed]
    branches: [staging]

jobs:
  deploy-staging:
    name: deploy-staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging environment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.STAGING_APP_DIR }}
            git fetch origin staging
            git checkout staging
            git reset --hard origin/staging
            docker compose pull
            docker compose up -d --build

      - name: Smoke test all internal ready endpoints
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          STAGING_FRAUD_URL: ${{ secrets.STAGING_FRAUD_URL }}
          STAGING_TRIGGER_URL: ${{ secrets.STAGING_TRIGGER_URL }}
        run: |
          set -euo pipefail
          for endpoint in \
            "${STAGING_API_URL}/internal/ready" \
            "${STAGING_FRAUD_URL}/internal/ready" \
            "${STAGING_TRIGGER_URL}/internal/ready"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint")
            if [ "$code" != "200" ]; then
              echo "Smoke test failed for $endpoint (status=$code)"
              exit 1
            fi
            echo "Smoke test passed for $endpoint"
          done
