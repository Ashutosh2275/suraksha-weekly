name: suraksha-ci-cd

on:
  push:
    branches: [develop, staging]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install npm workspace dependencies
        run: npm ci

      - name: Install Python dependencies (api/fraud/trigger + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          for svc in api fraud trigger; do
            pip install -r "services/${svc}/requirements.txt"
          done

      - name: Build Docker images (api/fraud/trigger)
        run: |
          docker build -t suraksha-api:${{ github.sha }} -f services/api/Dockerfile .
          docker build -t suraksha-fraud:${{ github.sha }} -f services/fraud/Dockerfile .
          docker build -t suraksha-trigger:${{ github.sha }} -f services/trigger/Dockerfile .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy scan (fail on CRITICAL CVEs)
        run: |
          trivy image --severity CRITICAL --exit-code 1 --no-progress suraksha-api:${{ github.sha }}
          trivy image --severity CRITICAL --exit-code 1 --no-progress suraksha-fraud:${{ github.sha }}
          trivy image --severity CRITICAL --exit-code 1 --no-progress suraksha-trigger:${{ github.sha }}

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: suraksha
          POSTGRES_PASSWORD: suraksha
          POSTGRES_DB: suraksha_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suraksha -d suraksha_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://suraksha:suraksha@localhost:5432/suraksha_db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret
      ENVIRONMENT: ci
      MOCK_MODE: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install npm workspace dependencies
        run: npm ci

      - name: Install Python dependencies (all services + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          for svc in api fraud trigger; do
            pip install -r "services/${svc}/requirements.txt"
          done

      - name: Run database migrations
        working-directory: services/api
        run: alembic upgrade head

      - name: Run pytest with coverage threshold >= 80%
        run: |
          set -euo pipefail
          for svc in api fraud trigger; do
            echo "Running pytest for services/${svc}"
            pushd "services/${svc}" >/dev/null

            COV_ARGS=()
            if [ -d app/services ]; then
              COV_ARGS+=(--cov=app/services)
            fi
            if [ -d app/rules ]; then
              COV_ARGS+=(--cov=app/rules)
            fi
            if [ -d services ]; then
              COV_ARGS+=(--cov=services)
            fi
            if [ -d rules ]; then
              COV_ARGS+=(--cov=rules)
            fi
            if [ "${#COV_ARGS[@]}" -eq 0 ]; then
              echo "No coverage target directories found in services/${svc}; skipping with failure."
              exit 1
            fi

            pytest tests -v --junitxml="junit-${svc}.xml" "${COV_ARGS[@]}" --cov-report=term-missing --cov-fail-under=80
            popd >/dev/null
          done

      - name: Run npm test for worker-web
        run: npm test -w apps/worker-web --if-present

      - name: Run npm test for admin-web
        run: npm test -w apps/admin-web --if-present

      - name: Publish test results summary
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for svc in api fraud trigger; do
            XML_PATH="services/${svc}/junit-${svc}.xml"
            if [ -f "${XML_PATH}" ]; then
              echo "- ${svc}: junit report generated at ${XML_PATH}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ${svc}: junit report missing" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "- worker-web npm test: executed with --if-present" >> "$GITHUB_STEP_SUMMARY"
          echo "- admin-web npm test: executed with --if-present" >> "$GITHUB_STEP_SUMMARY"

  security-scan:
    name: security-scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install npm workspace dependencies
        run: npm ci

      - name: Install Python security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit detect-secrets

      - name: Run Bandit on all Python services
        run: |
          bandit -r services/api -x services/api/tests -lll
          bandit -r services/fraud -x services/fraud/tests -lll
          bandit -r services/trigger -x services/trigger/tests -lll

      - name: Run detect-secrets on repository (hard fail on any finding)
        run: |
          detect-secrets scan --all-files > .secrets.baseline
          python -c "import json,sys; d=json.load(open('.secrets.baseline', encoding='utf-8')); r=d.get('results',{}); f=sum(len(v) for v in r.values()); print('FAIL: detect-secrets found %d potential secrets.' % f) if f else print('PASS: detect-secrets found no potential secrets.'); sys.exit(1 if f else 0)"

      - name: Run npm audit (high and above)
        run: npm audit --audit-level=high

  contract-tests:
    name: contract-tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          pip install -r services/api/requirements.txt

      - name: Start full docker-compose stack
        run: docker compose up -d --build

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/internal/ready || true)
            if [ "$code" = "200" ]; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          exit 1

      - name: Run contracts suite
        run: pytest tests/contracts -v --tb=short

      - name: Run API breaking-change compatibility check
        run: python scripts/check_breaking_changes.py

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  e2e-tests:
    name: e2e-tests
    needs: contract-tests
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install npm workspace dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          pip install -r services/api/requirements.txt

      - name: Start full docker-compose stack with seed data
        run: |
          docker compose up -d --build
          python scripts/seed.py

      - name: Run Playwright onboarding-to-payout journey
        run: |
          if [ ! -f "playwright.config.ts" ] && [ ! -f "playwright.config.js" ]; then
            echo "Playwright config not found; add Playwright tests for onboarding-to-payout journey."
            exit 1
          fi
          npx playwright install --with-deps
          npx playwright test

      - name: Run fraud simulation scenarios
        run: |
          docker run --rm -i --network host -v "${PWD}:/work" -w /work grafana/k6 run tests/load/scenario_4_fraud_abuse.js --env BASE_URL=http://localhost:8000

      - name: Tear down stack
        if: always()
        run: docker compose down -v
